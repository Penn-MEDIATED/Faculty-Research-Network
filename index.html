<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How the Penn Center on Media, Technology, and Democracy studies the Information Ecosystem</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fafaf8;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 20px 24px;
    }
    h1 {
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -0.4px;
      margin-bottom: 18px;
    }
    #layout {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      justify-content: center;
    }
    #svg-wrap { flex-shrink: 0; }
    #sidebar {
      width: 230px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .paper-card {
      background: white;
      border-radius: 12px;
      border: 1.5px solid #e2e8f0;
      padding: 14px 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,.05);
      transition: border-color .15s, box-shadow .15s;
    }
    .paper-card.active {
      border-color: rgb(204, 85, 0);
      box-shadow: 0 4px 20px rgba(204,85,0,.18);
    }
    .card-label {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    .card-name {
      font-weight: 800;
      font-size: 13px;
      color: #1e293b;
      margin-bottom: 2px;
    }
    .card-school {
      font-size: 11px;
      color: #94a3b8;
      font-style: italic;
      margin-bottom: 10px;
    }
    .card-desc {
      font-size: 11.5px;
      color: #475569;
      line-height: 1.7;
      margin: 0;
    }
    .card-desc a {
      color: #1e40af;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .paper-card { cursor: pointer; }
    .card-body {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #f1f5f9;
    }
    .paper-card.active .card-body { display: block; }
    #actor-card {
      display: none;
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    #actor-card.visible { display: block; }
    .a-tag {
      font-size: 9.5px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .09em;
      margin-bottom: 6px;
    }
    .a-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .a-desc {
      font-size: 11.5px;
      color: #475569;
      line-height: 1.65;
      margin: 0 0 12px;
    }
    .a-faculty {
      font-size: 11px;
      color: #64748b;
      line-height: 1.6;
      border-top: 1px solid #f1f5f9;
      padding-top: 10px;
    }
    .a-faculty-label {
      font-weight: 700;
      color: #334155;
      display: block;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>

<h1>How the Penn Center on Media, Technology, and Democracy studies the Information Ecosystem</h1>
<div id="layout">
  <div id="svg-wrap"></div>
  <div id="sidebar">
    <div id="actor-card"></div>
    <div id="paper-cards"></div>
  </div>
</div>

<script>
(function () {
  var W = 860, H = 590;

  var ACTORS = [
    {

      icon: '<line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 20 7 4 7"/>'
    },

      desc: 'Broadcast, cable, local, and digital news organizations. Produce and frame information that shapes public knowledge and political attitudes.',
      icon: '<path d="M4 3h16a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="16" y2="11"/><line x1="8" y1="15" x2="12" y2="15"/>'
    },
    {
      id: 'social',
      label: ['Social Media'],
      color: '#0369a1',
      cx: 300, cy: 340,
      faculty: 'Gonz\u00e1lez-Bail\u00f3n, Freelon, Watts, Metaxa, Roth, Levendusky, Lelkes',
      desc: 'Platforms for user-generated content, real-time information sharing, and algorithmic content distribution. Shape political discourse, misinformation spread, and community formation.',
      icon: '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>'
    },
    {
      id: 'llms',
      label: ['LLMs'],
      color: '#7c3aed',
      cx: 560, cy: 340,
      faculty: 'Callison-Burch, Metaxa, Yildirim, Patton, Knox, Ungar, Yoo',
      desc: 'Large language models and generative AI systems. Increasingly used for content creation, information retrieval, and automated communication, with growing implications for trust and epistemic autonomy.',
      icon: '<path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>'
    },
    {
      id: 'elites',
      label: ['Elites'],
      color: '#6d28d9',
      cx: 760, cy: 315,
      faculty: 'Levendusky, Mutz, Hopkins, Knox, Gutmann, Lapinski, Yildirim',
      desc: 'Politicians, political parties, business leaders, and other high-influence actors. Set agendas and shape the information environment through their visibility and power.',
      icon: '<path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/>'
    }
  ];

  var PUBLIC = {
    id: 'public',
    label: ['General Public'],
    color: '#0e7490',
    faculty: 'Albarrac\u00edn, Falk, Melumad, Lelkes, Mutz, Ungar, Patton, Metaxa, Hopkins, Levendusky, Freelon',
    desc: 'Citizens, voters, partisan audiences, and marginalized communities. Both the primary audience of the information ecosystem and active participants who generate content and drive demand.',
    icon: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>'
  };

  var ALL_ACTORS = ACTORS.concat([PUBLIC]);

  var CROWD = [
    { x: 88,  y: 142, size: 26, op: 0.80 },
    { x: 262, y: 55,  size: 32, op: 0.90 },
    { x: 718, y: 88,  size: 24, op: 0.75 },
    { x: 574, y: 148, size: 29, op: 0.85 },
    { x: 152, y: 395, size: 36, op: 1.00 },
    { x: 672, y: 238, size: 22, op: 0.70 },
    { x: 66,  y: 502, size: 30, op: 0.88 },
    { x: 345, y: 492, size: 27, op: 0.82 },
    { x: 558, y: 458, size: 34, op: 0.92 },
    { x: 792, y: 402, size: 26, op: 0.78 },
    { x: 198, y: 225, size: 21, op: 0.65 },
    { x: 694, y: 512, size: 29, op: 0.88 },
    { x: 428, y: 538, size: 24, op: 0.72 },
    { x: 824, y: 148, size: 22, op: 0.68 }
  ];

  var PAPERS = [
    {
      id: 'santoro',
      paths: ['M 363,507 Q 381,526 408,531'],
      bidir: false,
      faculty: 'Erik Santoro',
      school: 'Wharton School',
      link: 'https://www.pnas.org/doi/10.1073/pnas.2421982122',
      linkText: 'recent research',
      before: 'Santoro studies peer-to-peer dialogue. His ',
      after: ' challenges the notion that listening to those who disagree with you helps to persuade them.'
    },
    {
      id: 'mutz',
      paths: ['M 104,159 Q 134,196 181,215'],
      bidir: true,
      faculty: 'Diana Mutz',
      school: 'Annenberg School',
      link: 'https://www.pnas.org/doi/10.1073/pnas.2516942122',
      linkText: 'a significant increase',
      before: 'Mutz discovered ',
      after: ' in political discussions in the U.S., but no increase in conversations across the political aisle.'
    },
    {
      id: 'levendusky',
      paths: [
        'M 206,234 Q 245,278 283,321',
        'M 276,350 Q 230,368 171,388'
      ],
      bidir: false,
      faculty: 'Matt Levendusky',
      school: 'Annenberg School',
      link: 'https://www.journals.uchicago.edu/doi/abs/10.1086/733004',
      linkText: 'vastly overestimate how often others cancel offensive speech',
      before: 'Levendusky, Dias, and Druckman find that Americans ',
      after: ' on social media — though they accurately understand what motivates it, fueling self-censorship and partisan animus.'
    },
    {
      id: 'metaxa',
      paths: [
        'M 663,246 Q 620,285 579,322'
      ],
      bidir: false,
      faculty: 'Danaé Metaxa',
      school: 'Computer and Information Sciences',
      link: 'https://arxiv.org/abs/2510.01255',
      linkText: 'AI Watchman',
      before: 'Metaxa and colleagues introduce ',
      after: ', a longitudinal system that audits how LLMs moderate responses to social issues over time — revealing the opaque, frequently changing policies that shape what users can and cannot ask.'
    },
    {
      id: 'melumad',
      paths: [
        'M 577,164 Q 590,244 568,315',
        'M 565,365 Q 572,400 562,439'
      ],
      bidir: false,
      faculty: 'Shiri Melumad',
      school: 'Wharton School',
      link: 'https://academic.oup.com/pnasnexus/article/4/10/pgaf316/8303888',
      linkText: 'develop shallower knowledge',
      before: 'Melumad and Yun find that people who rely on LLM summaries ',
      after: ' than those using traditional web search — even when the underlying facts are identical — because LLMs bypass the active discovery process that deepens learning.'
    },
    {
      id: 'lelkes',
      paths: [
        'M 534,340 Q 420,315 326,340',
        'M 307,365 Q 325,422 341,478'
      ],
      bidir: false,
      faculty: 'Yphtach Lelkes',
      school: 'Annenberg School',
      link: 'https://aclanthology.org/2025.findings-acl.1144/',
      linkText: 'identical content receives markedly different hate speech classifications',
      before: 'Fasching and Lelkes find that ',
      after: ' across LLM-based moderation systems — with inconsistencies especially pronounced for content about groups defined by education, class, and personal interests.'
    },
    {
      id: 'callisonburch',
      paths: [
        'M 534,339 Q 330,270 126,316',
        'M 126,318 Q 450,350 777,400'
      ],
      bidir: false,
      faculty: 'Chris Callison-Burch',
      school: 'Computer and Information Science',
      link: 'https://dl.acm.org/doi/full/10.1145/3706598.3713716',
      linkText: 'the Media Bias Detector',
      before: 'Callison-Burch, Watts and colleagues introduce ',
      after: ', an LLM-powered tool that analyzes real-time selection and framing bias across news publishers — revealing how editorial decisions shape the information readers receive.'
    },
    {
      id: 'gonzalezbailon',
      paths: [
        'M 126,318 Q 200,295 274,337',
        'M 324,350 Q 480,450 679,507'
      ],
      bidir: false,
      faculty: 'Sandra Gonz\u00e1lez-Bail\u00f3n',
      school: 'Annenberg School',
      link: 'https://journals.sagepub.com/doi/abs/10.1177/14614448251341496',
      linkText: 'more platforms produce less aggregate news attention',
      before: 'Yang and Gonz\u00e1lez-Bail\u00f3n track news exposure across TV, web, and YouTube for 55,000 Americans, finding that ',
      after: ' — a committed minority of news followers account for most traffic, while a multi-platform environment widens the gap between news consumers and avoiders.'
    },
    {
      id: 'watts',
      paths: [
        'M 95,343 Q 75,415 68,485',
        'M 98,287 Q 92,215 89,157',
        'M 115,291 Q 175,175 251,70'
      ],
      bidir: false,
      faculty: 'Duncan Watts',
      school: 'Computer and Information Science',
      link: 'https://www.nature.com/articles/s41598-025-01046-7',
      linkText: 'increasingly diverged from broadcast news',
      before: 'Watts and colleagues analyze 13 million TV news segments to show that cable news has ',
      after: ' in topic selection and language since 2012 — driven more by changes in hard news coverage than opinion content.'
    },
    {
      id: 'hopkins',
      paths: [
        'M 707,95 Q 500,200 322,327',
        'M 284,358 Q 190,390 112,332'
      ],
      bidir: false,
      faculty: 'Dan Hopkins',
      school: 'Political Science',
      link: 'https://onlinelibrary.wiley.com/doi/10.1111/ajps.12875',
      linkText: 'a growing emphasis on race, gender, and partisan identity',
      before: 'Hopkins uses NLP to track how 19 news outlets frame content on social media, finding ',
      after: ' in coverage from 2008 to 2021 — driven by both outlet strategy and audience demand, with implications for polarization and representation.'
    },
    {
      id: 'miller',
      paths: [
        'M 419,95 Q 350,200 311,317'
      ],
      bidir: false,
      faculty: 'Blake Miller',
      school: 'Political Science',
      link: 'https://www.cambridge.org/core/journals/china-quarterly/article/who-not-what-the-logic-of-chinas-information-control-strategy/4DC69883679770CBCDB1F1B87A34F09E',
      linkText: 'who is posting rather than what',
      before: 'Miller and Gallagher find that China\u2019s information controls focus on ',
      after: ' \u2014 the state permits open online debate while targeting influential users and networks whose independence could challenge party authority.'
    }
  ];

  /* ---- helpers ---- */
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function iconSVG(paths, color, size, sw) {
    var half = (size / 2).toFixed(1);
    var top  = (size * 0.65).toFixed(1);
    return '<svg x="-' + half + '" y="-' + top + '" width="' + size + '" height="' + size +
      '" viewBox="0 0 24 24" fill="none" stroke="' + color +
      '" stroke-width="' + (sw || 1.6) +
      '" stroke-linecap="round" stroke-linejoin="round" style="pointer-events:none">' +
      paths + '</svg>';
  }

  /* ---- build SVG string ---- */
  function buildSVG() {
    var s = '<svg id="diagram" width="' + W + '" height="' + H +
      '" viewBox="0 0 ' + W + ' ' + H +
      '" xmlns="http://www.w3.org/2000/svg">';

    s += '<rect width="' + W + '" height="' + H + '" fill="#fafaf8"/>';

    /* markers */
    s += '<defs>';
    s += '<marker id="tip" viewBox="0 0 10 10" refX="9" refY="5"' +
         ' markerWidth="6" markerHeight="6" orient="auto">' +
         '<path d="M 0 1 L 9 5 L 0 9 z" fill="#94a3b8"/></marker>';
    s += '<marker id="tip-bi" viewBox="0 0 10 10" refX="9" refY="5"' +
         ' markerWidth="6" markerHeight="6" orient="auto-start-reverse">' +
         '<path d="M 0 1 L 9 5 L 0 9 z" fill="#94a3b8"/></marker>';
    s += '<marker id="tip-hover" viewBox="0 0 10 10" refX="9" refY="5"' +
         ' markerWidth="6" markerHeight="6" orient="auto">' +
         '<path d="M 0 1 L 9 5 L 0 9 z" fill="rgb(204,85,0)"/></marker>';
    s += '<marker id="tip-bi-hover" viewBox="0 0 10 10" refX="9" refY="5"' +
         ' markerWidth="6" markerHeight="6" orient="auto-start-reverse">' +
         '<path d="M 0 1 L 9 5 L 0 9 z" fill="rgb(204,85,0)"/></marker>';
    s += '</defs>';

    /* research arrows */
    PAPERS.forEach(function (p) {
      var ms = p.bidir ? ' marker-start="url(#tip-bi)"' : '';
      p.paths.forEach(function (pathD, idx) {
        s += '<g class="arrow-g" data-arrow="' + p.id + '">';
        s += '<path d="' + pathD + '" fill="none" stroke="transparent" stroke-width="12"/>';
        s += '<path class="arrow-vis" id="av-' + p.id + '-' + idx + '" d="' + pathD +
             '" fill="none" stroke="#94a3b8" stroke-width="2.2"' +
             ' stroke-dasharray="6,4" opacity="0.65"' +
             ' marker-end="url(#tip)"' + ms + '/>';
        s += '</g>';
      });
    });

    /* main actor nodes */
    ACTORS.forEach(function (a) {
      s += '<g class="actor-g" data-actor="' + a.id +
           '" transform="translate(' + a.cx + ',' + a.cy + ')" style="cursor:pointer">';
      s += iconSVG(a.icon, a.color, 46, 1.6);
      a.label.forEach(function (line, i) {
        s += '<text y="' + (28 + i * 14) +
             '" text-anchor="middle" font-size="11" font-weight="700"' +
             ' fill="' + a.color + '" style="pointer-events:none">' +
             esc(line) + '</text>';
      });
      s += '</g>';
    });

    /* public crowd */
    CROWD.forEach(function (pos) {
      s += '<g class="actor-g" data-actor="public" data-base-op="' + pos.op +
           '" transform="translate(' + pos.x + ',' + pos.y + ')"' +
           ' opacity="' + pos.op + '" style="cursor:pointer">';
      s += iconSVG(PUBLIC.icon, PUBLIC.color, pos.size * 1.1, 1.5);
      s += '</g>';
    });

    s += '</svg>';
    return s;
  }

  /* ---- state ---- */
  var selectedActor = null;
  var hoveredArrow  = null;
  var hoveredCard   = null;

  /* ---- render SVG ---- */
  document.getElementById('svg-wrap').innerHTML = buildSVG();

  /* ---- activate / deactivate a paper (card + arrows) ---- */
  function activatePaper(id) {
    var card = document.getElementById('card-' + id);
    if (card) card.classList.add('active');
    document.querySelectorAll('[id^="av-' + id + '-"]').forEach(function (vis) {
      vis.setAttribute('stroke', 'rgb(204,85,0)');
      vis.setAttribute('stroke-width', '2.9');
      vis.removeAttribute('stroke-dasharray');
      vis.setAttribute('opacity', '1');
      vis.setAttribute('marker-end', 'url(#tip-hover)');
      if (vis.hasAttribute('marker-start')) vis.setAttribute('marker-start', 'url(#tip-bi-hover)');
    });
  }

  function deactivatePaper(id) {
    var card = document.getElementById('card-' + id);
    if (card) card.classList.remove('active');
    document.querySelectorAll('[id^="av-' + id + '-"]').forEach(function (vis) {
      vis.setAttribute('stroke', '#94a3b8');
      vis.setAttribute('stroke-width', '2.2');
      vis.setAttribute('stroke-dasharray', '6,4');
      vis.setAttribute('opacity', '0.65');
      vis.setAttribute('marker-end', 'url(#tip)');
      if (vis.hasAttribute('marker-start')) vis.setAttribute('marker-start', 'url(#tip-bi)');
    });
  }

  /* ---- render sidebar panels ---- */
  function renderPaperCards() {
    var html = '';
    PAPERS.forEach(function (p) {
      html += '<div class="paper-card" id="card-' + p.id + '" data-paper="' + p.id + '">';
      html += '<div class="card-label">Research</div>';
      html += '<div class="card-name">' + esc(p.faculty) + '</div>';
      html += '<div class="card-school">' + esc(p.school) + '</div>';
      html += '<div class="card-body">';
      html += '<p class="card-desc">' + esc(p.before) +
              '<a href="' + p.link + '" target="_blank" rel="noopener noreferrer">' +
              esc(p.linkText) + '</a>' + esc(p.after) + '</p>';
      html += '</div>';
      html += '</div>';
    });
    document.getElementById('paper-cards').innerHTML = html;
    document.querySelectorAll('.paper-card').forEach(function (card) {
      var pid = card.getAttribute('data-paper');
      card.addEventListener('mouseenter', function () {
        hoveredCard = pid;
        activatePaper(pid);
      });
      card.addEventListener('mouseleave', function () {
        hoveredCard = null;
        if (hoveredArrow !== pid) deactivatePaper(pid);
      });
    });
  }

  function renderActorCard() {
    var el = document.getElementById('actor-card');
    if (!selectedActor) {
      el.classList.remove('visible');
      el.innerHTML = '';
      el.style.border = '';
      return;
    }
    var actor = null;
    for (var i = 0; i < ALL_ACTORS.length; i++) {
      if (ALL_ACTORS[i].id === selectedActor) { actor = ALL_ACTORS[i]; break; }
    }
    if (!actor) return;
    el.style.border = '2px solid ' + actor.color;
    el.innerHTML =
      '<div class="a-tag" style="color:' + actor.color + '">Actor</div>' +
      '<div class="a-title" style="color:' + actor.color + '">' +
        esc(actor.label.join(' ')) +
      '</div>' +
      '<p class="a-desc">' + esc(actor.desc) + '</p>' +
      '<div class="a-faculty">' +
        '<span class="a-faculty-label">Faculty studying this actor</span>' +
        esc(actor.faculty) +
      '</div>';
    el.classList.add('visible');
  }

  /* ---- dim / undim actors ---- */
  function updateDim() {
    var nodes = document.querySelectorAll('.actor-g');
    for (var i = 0; i < nodes.length; i++) {
      var g  = nodes[i];
      var id = g.getAttribute('data-actor');
      if (selectedActor !== null && id !== selectedActor) {
        if (id === 'public') {
          var base = parseFloat(g.getAttribute('data-base-op') || '1');
          g.setAttribute('opacity', (base * 0.2).toFixed(3));
        } else {
          g.setAttribute('opacity', '0.2');
        }
      } else {
        if (id === 'public') {
          g.setAttribute('opacity', g.getAttribute('data-base-op') || '1');
        } else {
          g.removeAttribute('opacity');
        }
      }
    }
  }

  /* ---- event listeners ---- */
  var actorNodes = document.querySelectorAll('.actor-g');
  for (var i = 0; i < actorNodes.length; i++) {
    (function (g) {
      g.addEventListener('click', function () {
        var id = g.getAttribute('data-actor');
        selectedActor = (selectedActor === id) ? null : id;
        updateDim();
        renderActorCard();
      });
    })(actorNodes[i]);
  }

  var arrowGroups = document.querySelectorAll('.arrow-g');
  for (var j = 0; j < arrowGroups.length; j++) {
    (function (g) {
      var arrowId = g.getAttribute('data-arrow');
      g.addEventListener('mouseenter', function () {
        hoveredArrow = arrowId;
        activatePaper(arrowId);
      });
      g.addEventListener('mouseleave', function () {
        hoveredArrow = null;
        if (hoveredCard !== arrowId) deactivatePaper(arrowId);
      });
    })(arrowGroups[j]);
  }

  /* ---- initial render ---- */
  renderPaperCards();
  renderActorCard();

})();
</script>
</body>
</html>
